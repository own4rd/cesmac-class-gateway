services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak/cesmac-realm.json:/opt/keycloak/data/import/cesmac-realm.json:ro
